<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Radio z assets/piosenki + Shoutbox</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        
        .player-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .shoutbox-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            height: fit-content;
            max-height: 700px;
        }
        
        h2, h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
        }
        
        /* Header z info o folderze */
        .folder-info {
            background: rgba(78, 205, 196, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid #4ecdc4;
        }
        
        .folder-path {
            font-family: monospace;
            font-size: 16px;
            color: #4ecdc4;
            margin-bottom: 5px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* Styl odtwarzacza */
        .current-track {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .album-art {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .track-filename {
            font-size: 13px;
            opacity: 0.6;
            font-family: monospace;
        }
        
        .progress-container {
            margin: 20px 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #4ecdc4;
            border-radius: 3px;
            transition: width 0.1s;
            position: relative;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translate(50%, -50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }
        
        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
        }
        
        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .control-btn.play-pause {
            width: 65px;
            height: 65px;
            font-size: 26px;
            background: #4ecdc4;
            border: none;
        }
        
        .control-btn.play-pause:hover {
            background: #45b7ae;
        }
        
        .control-btn.active {
            background: #4ecdc4;
            border: none;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #4ecdc4;
            border-radius: 50%;
            cursor: pointer;
        }
        
        /* Playlista */
        .playlist-section {
            margin-top: 30px;
        }
        
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .refresh-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .playlist {
            max-height: 400px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .playlist-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255,255,255,0.1);
        }
        
        .playlist-item.active {
            background: rgba(78, 205, 196, 0.2);
            border-left: 3px solid #4ecdc4;
        }
        
        .playlist-item-number {
            width: 35px;
            font-weight: bold;
            opacity: 0.5;
            font-size: 14px;
        }
        
        .playlist-item-info {
            flex: 1;
        }
        
        .playlist-item-title {
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .playlist-item-filename {
            font-size: 11px;
            opacity: 0.5;
            font-family: monospace;
        }
        
        .playlist-item-duration {
            margin-right: 10px;
            font-size: 13px;
            opacity: 0.7;
        }
        
        .play-icon {
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 18px;
        }
        
        .playlist-item:hover .play-icon {
            opacity: 0.7;
        }
        
        .playlist-item.active .play-icon {
            opacity: 1;
            color: #4ecdc4;
        }
        
        /* Shoutbox */
        .shoutbox-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            min-height: 300px;
            max-height: 500px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 2px solid #667eea;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .message-name {
            font-weight: bold;
            color: #4ecdc4;
        }
        
        .message-time {
            font-size: 11px;
            opacity: 0.5;
        }
        
        .message-text {
            word-wrap: break-word;
            line-height: 1.4;
        }
        
        .shoutbox-input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .shoutbox-input-area input,
        .shoutbox-input-area textarea {
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 14px;
            font-family: inherit;
        }
        
        .shoutbox-input-area input:focus,
        .shoutbox-input-area textarea:focus {
            outline: none;
            border-color: #4ecdc4;
        }
        
        .shoutbox-input-area textarea {
            resize: vertical;
            min-height: 70px;
        }
        
        .shoutbox-input-area button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .shoutbox-input-area button:hover {
            background: #5a67d8;
        }
        
        .clear-shoutbox {
            margin-top: 10px;
            padding: 8px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .clear-shoutbox:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        
        /* Loader */
        .loader {
            text-align: center;
            padding: 20px;
            opacity: 0.7;
        }
        
        .error-message {
            color: #ef4444;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            margin: 10px 0;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sekcja odtwarzacza -->
        <div class="player-section">
            <h2>🎵 Radio Lokalne</h2>
            
            <!-- Info o folderze -->
            <div class="folder-info">
                <div class="folder-path">📁 assets/piosenki/</div>
                <div class="stats">
                    <div class="stat-item">
                        <span>🎵</span>
                        <span id="totalSongs">0 utworów</span>
                    </div>
                    <div class="stat-item">
                        <span>⏱️</span>
                        <span id="totalDuration">0:00</span>
                    </div>
                </div>
            </div>
            
            <!-- Aktualnie odtwarzany utwór -->
            <div class="current-track">
                <div class="album-art" id="albumArt">🎵</div>
                <div class="track-info">
                    <div class="track-name" id="trackName">Wybierz utwór</div>
                    <div class="track-filename" id="trackFilename">-</div>
                </div>
            </div>
            
            <!-- Progress bar -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            
            <!-- Kontrolki -->
            <div class="controls">
                <button class="control-btn" id="prevBtn" title="Poprzedni">⏮️</button>
                <button class="control-btn play-pause" id="playPauseBtn">▶️</button>
                <button class="control-btn" id="nextBtn" title="Następny">⏭️</button>
                <button class="control-btn" id="shuffleBtn" title="Losowo">🔀</button>
                <button class="control-btn" id="repeatBtn" title="Zapętl">🔁</button>
            </div>
            
            <!-- Głośność -->
            <div class="volume-control">
                <span>🔈</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
                <span>🔊</span>
                <span id="volumeValue">70%</span>
            </div>
            
            <!-- Playlista -->
            <div class="playlist-section">
                <div class="playlist-header">
                    <h3>📋 Playlista</h3>
                    <button class="refresh-btn" id="refreshBtn">🔄 Odśwież</button>
                </div>
                <div class="playlist" id="playlist">
                    <div class="loader">⏳ Ładowanie utworów...</div>
                </div>
            </div>
        </div>
        
        <!-- Sekcja shoutboxa -->
        <div class="shoutbox-section">
            <h2>💬 Shoutbox</h2>
            
            <div class="shoutbox-messages" id="shoutboxMessages"></div>
            
            <div class="shoutbox-input-area">
                <input type="text" id="shoutboxName" placeholder="Twoje imię" value="Słuchacz" maxlength="20">
                <textarea id="shoutboxMessage" placeholder="Napisz co myślisz o muzyce..."></textarea>
                <button id="sendMessageBtn">✉️ Wyślij wiadomość</button>
            </div>
            
            <button class="clear-shoutbox" id="clearShoutboxBtn">🗑️ Wyczyść shoutbox</button>
        </div>
    </div>
    
    <!-- Ukryty element audio -->
    <audio id="audioPlayer" style="display: none;"></audio>

    <script>
        (function() {
            "use strict";
            
            // ---------- Konfiguracja ----------
            const MUSIC_FOLDER = 'assets/piosenki/';
            
            // Lista plików MP3 w folderze (zakładamy, że są to pliki)
            // Możesz dodać własne nazwy plików tutaj lub użyć dynamicznego skanowania
            const SONG_FILES = [
                'song1.mp3',
                'song2.mp3',
                'song3.mp3',
                'song4.mp3',
                'song5.mp3',
                // Dodaj więcej plików według potrzeb
            ];
            
            // ---------- Elementy DOM ----------
            const audioPlayer = document.getElementById('audioPlayer');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const repeatBtn = document.getElementById('repeatBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const currentTimeEl = document.getElementById('currentTime');
            const durationEl = document.getElementById('duration');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeValue = document.getElementById('volumeValue');
            const trackNameEl = document.getElementById('trackName');
            const trackFilenameEl = document.getElementById('trackFilename');
            const albumArtEl = document.getElementById('albumArt');
            const playlistEl = document.getElementById('playlist');
            const totalSongsEl = document.getElementById('totalSongs');
            const totalDurationEl = document.getElementById('totalDuration');
            const refreshBtn = document.getElementById('refreshBtn');
            
            // ---------- Stan aplikacji ----------
            let playlist = [];
            let currentTrackIndex = -1;
            let isShuffle = false;
            let isRepeat = false;
            let totalDuration = 0;
            
            // ---------- Inicjalizacja ----------
            function init() {
                loadShoutboxFromStorage();
                setupEventListeners();
                audioPlayer.volume = volumeSlider.value / 100;
                updateVolumeDisplay();
                
                // Załaduj playlistę
                loadPlaylist();
            }
            
            // ---------- Ładowanie playlisty ----------
            async function loadPlaylist() {
                playlistEl.innerHTML = '<div class="loader">⏳ Skanowanie folderu assets/piosenki/...</div>';
                
                playlist = [];
                let loadedCount = 0;
                totalDuration = 0;
                
                // Próbuj załadować każdy plik
                for (const filename of SONG_FILES) {
                    try {
                        const track = await createTrackFromFile(filename);
                        if (track) {
                            playlist.push(track);
                            loadedCount++;
                        }
                    } catch (error) {
                        console.warn(`Nie można załadować ${filename}:`, error);
                    }
                }
                
                // Jeśli nie znaleziono plików z listy, pokaż informację
                if (playlist.length === 0) {
                    playlistEl.innerHTML = `
                        <div class="error-message">
                            ❌ Nie znaleziono plików MP3 w folderze ${MUSIC_FOLDER}<br>
                            <small>Upewnij się, że pliki istnieją i mają rozszerzenie .mp3</small><br><br>
                            <strong>Oczekiwane pliki:</strong><br>
                            ${SONG_FILES.map(f => `📁 ${f}`).join('<br>')}
                        </div>
                    `;
                    totalSongsEl.textContent = '0 utworów';
                    return;
                }
                
                renderPlaylist();
                updateStats();
                
                // Automatycznie wybierz pierwszy utwór
                if (playlist.length > 0) {
                    selectTrack(0);
                }
            }
            
            function createTrackFromFile(filename) {
                return new Promise((resolve) => {
                    const audio = new Audio();
                    const url = MUSIC_FOLDER + filename;
                    
                    audio.addEventListener('loadedmetadata', () => {
                        const track = {
                            id: filename,
                            name: formatTrackName(filename),
                            filename: filename,
                            url: url,
                            duration: audio.duration
                        };
                        
                        totalDuration += audio.duration;
                        resolve(track);
                    });
                    
                    audio.addEventListener('error', () => {
                        // Plik nie istnieje lub błąd ładowania
                        resolve(null);
                    });
                    
                    audio.src = url;
                });
            }
            
            function formatTrackName(filename) {
                // Usuń rozszerzenie .mp3 i zamień podkreślniki/myślniki na spacje
                let name = filename.replace(/\.mp3$/i, '');
                name = name.replace(/[-_]/g, ' ');
                // Kapitalizuj pierwsze litery
                name = name.split(' ').map(word => 
                    word.charAt(0).toUpperCase() + word.slice(1)
                ).join(' ');
                return name;
            }
            
            function updateStats() {
                totalSongsEl.textContent = `${playlist.length} utworów`;
                
                const mins = Math.floor(totalDuration / 60);
                const secs = Math.floor(totalDuration % 60);
                totalDurationEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            
            // ---------- Zarządzanie playlistą ----------
            function selectTrack(index) {
                if (index < 0 || index >= playlist.length) return;
                
                currentTrackIndex = index;
                const track = playlist[index];
                
                audioPlayer.src = track.url;
                audioPlayer.load();
                
                updateNowPlayingDisplay(track);
                renderPlaylist();
                
                // Automatycznie rozpocznij odtwarzanie
                audioPlayer.play().catch(err => {
                    console.warn('Autoplay prevented:', err);
                });
                playPauseBtn.textContent = '⏸️';
            }
            
            function playNext() {
                if (playlist.length === 0) return;
                
                let nextIndex;
                if (isShuffle) {
                    do {
                        nextIndex = Math.floor(Math.random() * playlist.length);
                    } while (nextIndex === currentTrackIndex && playlist.length > 1);
                } else {
                    nextIndex = (currentTrackIndex + 1) % playlist.length;
                }
                
                selectTrack(nextIndex);
            }
            
            function playPrevious() {
                if (playlist.length === 0) return;
                
                let prevIndex;
                if (isShuffle) {
                    do {
                        prevIndex = Math.floor(Math.random() * playlist.length);
                    } while (prevIndex === currentTrackIndex && playlist.length > 1);
                } else {
                    prevIndex = currentTrackIndex - 1;
                    if (prevIndex < 0) prevIndex = playlist.length - 1;
                }
                
                selectTrack(prevIndex);
            }
            
            // ---------- Wyświetlanie ----------
            function renderPlaylist() {
                playlistEl.innerHTML = '';
                
                playlist.forEach((track, index) => {
                    const item = document.createElement('div');
                    item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
                    
                    const durationFormatted = track.duration ? formatTime(track.duration) : '--:--';
                    
                    item.innerHTML = `
                        <div class="playlist-item-number">${(index + 1).toString().padStart(2, '0')}</div>
                        <div class="playlist-item-info">
                            <div class="playlist-item-title">${escapeHtml(track.name)}</div>
                            <div class="playlist-item-filename">${escapeHtml(track.filename)}</div>
                        </div>
                        <div class="playlist-item-duration">${durationFormatted}</div>
                        <div class="play-icon">▶️</div>
                    `;
                    
                    item.addEventListener('click', () => selectTrack(index));
                    
                    playlistEl.appendChild(item);
                });
            }
            
            function updateNowPlayingDisplay(track) {
                if (track) {
                    trackNameEl.textContent = track.name;
                    trackFilenameEl.textContent = track.filename;
                    
                    // Losowa ikona/emoji dla album art
                    const icons = ['🎵', '🎸', '🎹', '🎺', '🎻', '🥁', '🎤', '📻', '🎼'];
                    albumArtEl.textContent = icons[Math.floor(Math.random() * icons.length)];
                } else {
                    trackNameEl.textContent = 'Wybierz utwór';
                    trackFilenameEl.textContent = '-';
                    albumArtEl.textContent = '🎵';
                }
            }
            
            function updateProgress() {
                const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressFill.style.width = `${progress || 0}%`;
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            }
            
            function updateDurationDisplay() {
                durationEl.textContent = formatTime(audioPlayer.duration);
            }
            
            function updateVolumeDisplay() {
                const volume = volumeSlider.value;
                volumeValue.textContent = `${volume}%`;
                audioPlayer.volume = volume / 100;
            }
            
            // ---------- Shoutbox ----------
            function loadShoutboxFromStorage() {
                const stored = localStorage.getItem('radio_shoutbox');
                if (stored) {
                    try {
                        const messages = JSON.parse(stored);
                        renderShoutbox(messages);
                    } catch(e) {
                        console.error('Błąd ładowania shoutboxa:', e);
                    }
                } else {
                    const defaultMsg = [{
                        name: 'Radio',
                        message: '🎵 Witaj w radiu! Słuchasz muzyki z folderu assets/piosenki/',
                        timestamp: Date.now()
                    }];
                    localStorage.setItem('radio_shoutbox', JSON.stringify(defaultMsg));
                    renderShoutbox(defaultMsg);
                }
            }
            
            function renderShoutbox(messages) {
                const container = document.getElementById('shoutboxMessages');
                container.innerHTML = '';
                
                messages.slice().reverse().forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'message';
                    
                    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('pl-PL', {
                        hour: '2-digit',
                        minute: '2-digit'
                    }) : '--:--';
                    
                    div.innerHTML = `
                        <div class="message-header">
                            <span class="message-name">${escapeHtml(msg.name)}</span>
                            <span class="message-time">${time}</span>
                        </div>
                        <div class="message-text">${escapeHtml(msg.message)}</div>
                    `;
                    
                    container.appendChild(div);
                });
                
                // Automatycznie przewiń na dół
                container.scrollTop = container.scrollHeight;
            }
            
            function addShoutboxMessage(name, text) {
                if (!name.trim() || !text.trim()) return;
                
                const stored = localStorage.getItem('radio_shoutbox');
                let messages = stored ? JSON.parse(stored) : [];
                
                messages.push({
                    name: name.trim(),
                    message: text.trim(),
                    timestamp: Date.now()
                });
                
                if (messages.length > 100) {
                    messages = messages.slice(-100);
                }
                
                localStorage.setItem('radio_shoutbox', JSON.stringify(messages));
                renderShoutbox(messages);
            }
            
            // ---------- Narzędzia ----------
            function formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // ---------- Event Listeners ----------
            function setupEventListeners() {
                // Odtwarzacz
                playPauseBtn.addEventListener('click', () => {
                    if (audioPlayer.paused) {
                        if (currentTrackIndex === -1 && playlist.length > 0) {
                            selectTrack(0);
                        } else {
                            audioPlayer.play();
                        }
                        playPauseBtn.textContent = '⏸️';
                    } else {
                        audioPlayer.pause();
                        playPauseBtn.textContent = '▶️';
                    }
                });
                
                prevBtn.addEventListener('click', playPrevious);
                nextBtn.addEventListener('click', playNext);
                
                shuffleBtn.addEventListener('click', () => {
                    isShuffle = !isShuffle;
                    shuffleBtn.classList.toggle('active', isShuffle);
                });
                
                repeatBtn.addEventListener('click', () => {
                    isRepeat = !isRepeat;
                    repeatBtn.classList.toggle('active', isRepeat);
                });
                
                // Progress bar
                progressBar.addEventListener('click', (e) => {
                    const rect = progressBar.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    audioPlayer.currentTime = percent * audioPlayer.duration;
                });
                
                audioPlayer.addEventListener('timeupdate', updateProgress);
                audioPlayer.addEventListener('loadedmetadata', updateDurationDisplay);
                audioPlayer.addEventListener('ended', () => {
                    if (isRepeat) {
                        audioPlayer.currentTime = 0;
                        audioPlayer.play();
                    } else {
                        playNext();
                    }
                });
                
                // Głośność
                volumeSlider.addEventListener('input', updateVolumeDisplay);
                
                // Odświeżanie playlisty
                refreshBtn.addEventListener('click', loadPlaylist);
                
                // Shoutbox
                document.getElementById('sendMessageBtn').addEventListener('click', () => {
                    const name = document.getElementById('shoutboxName').value || 'Słuchacz';
                    const message = document.getElementById('shoutboxMessage').value;
                    
                    if (message.trim()) {
                        addShoutboxMessage(name, message);
                        document.getElementById('shoutboxMessage').value = '';
                    }
                });
                
                document.getElementById('shoutboxMessage').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        document.getElementById('sendMessageBtn').click();
                    }
                });
                
                document.getElementById('clearShoutboxBtn').addEventListener('click', () => {
                    if (confirm('Na pewno wyczyścić cały shoutbox?')) {
                        localStorage.removeItem('radio_shoutbox');
                        loadShoutboxFromStorage();
                    }
                });
            }
            
            // Start aplikacji
            init();
        })();
    </script>
</body>
</html>
